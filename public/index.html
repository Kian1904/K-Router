  <title>K's Router</title>

<div id="terminal">

  <header id="header">
    <span id="header-title">K's Router</span>
    <span id="header-meta">v1.0</span>
  </header>

  <div id="output" role="log" aria-live="polite"></div>

  <div id="input-area">
    <span id="prompt">krouter[auto]:~$</span>
    <input
      id="input"
      type="text"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="none"
      spellcheck="false"
      placeholder="type /help for commands"
      aria-label="Terminal input"
    >
  </div>

</div>
