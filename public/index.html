<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>K-Router >_ Terminal Core</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0a0b10;
      --text-color: #a6accd;
      --prompt-color: #c792ea;
      --cmd-color: #89ddff;
      --success-color: #c3e88d;
      --error-color: #f07178;
      --warn-color: #ffcb6b;
      --info-color: #82aaff;
    }
    * { box-sizing: border-box; }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      margin: 0;
      padding: 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #terminal-output {
      flex: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 12px;
    }
    .line { margin-bottom: 3px; }
    .sys-greet { color: var(--success-color); font-weight: bold; }
    .error-msg { color: var(--error-color); }
    .warn-msg { color: var(--warn-color); }
    .info-msg { color: var(--info-color); }
    .cmd-line { color: var(--cmd-color); }
    
    .prompt-row {
      display: flex;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 8px;
    }
    .prompt-sign {
      color: var(--prompt-color);
      margin-right: 8px;
      user-select: none;
    }
    #terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--cmd-color);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      outline: none;
      padding: 0;
    }
  </style>
</head>
<body>

  <div id="terminal-output">
    <div class="line sys-greet">=== K-ROUTER CLI ENGINE TERMINAL v2.0 ===</div>
    <div class="line info-msg">Modular Clustered Architecture Layout (9router style)</div>
    <div class="line">Ketik 'help' untuk melihat manual baris perintah lengkap.</div>
    <div class="line">------------------------------------------------------------------</div>
  </div>

  <div class="prompt-row">
    <span class="prompt-sign" id="prompt-label">krouter_cli[auto_router]:~$</span>
    <input type="text" id="terminal-input" autofocus autocomplete="off" spellcheck="false">
  </div>

  <!-- Memanggil Otak Logika Eksternal Secara Berurutan -->
  <script src="/js/cli-models.js?v=999"></script>
  <script src="/js/cli-stats.js?v=999"></script>
  <script src="/js/cli-core.js?v=999"></script>
</body>
</html>
