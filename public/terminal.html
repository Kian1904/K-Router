<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>K-Router >_ Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d0e15;
      --text-color: #a6accd;
      --prompt-color: #c792ea;
      --cmd-color: #89ddff;
      --success-color: #c3e88d;
      --error-color: #f07178;
    }
    * { box-sizing: border-box; }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      margin: 0;
      padding: 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #terminal-output {
      flex: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 12px;
    }
    .line { margin-bottom: 4px; }
    .sys-greet { color: var(--success-color); }
    .error-msg { color: var(--error-color); }
    .prompt-row {
      display: flex;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 8px;
    }
    .prompt-sign {
      color: var(--prompt-color);
      margin-right: 8px;
      user-select: none;
    }
    #terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--cmd-color);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      outline: none;
      padding: 0;
    }
  </style>
</head>
<body>

  <div id="terminal-output">
    <div class="line sys-greet">K-ROUTER INTERACTIVE TERMINAL v1.0.0</div>
    <div class="line sys-greet">Type 'help' to view available commands.</div>
    <div class="line">--------------------------------------------------</div>
  </div>

  <div class="prompt-row">
    <span class="prompt-sign">krouter_cli:~$</span>
    <input type="text" id="terminal-input" autofocus autocomplete="off" spellcheck="false">
  </div>

<script>
  const outputEl = document.getElementById('terminal-output');
  const inputEl = document.getElementById('terminal-input');

  // Mengambil token bawaan K-Router yang tersimpan di browser
  let token = localStorage.getItem('kr_token') || '';

  function printLine(text, className = '') {
    const div = document.createElement('div');
    div.className = `line ${className}`;
    // Memastikan baris baru (\n) ter-render dengan baik di terminal
    div.innerText = text;
    outputEl.appendChild(div);
    outputEl.scrollTop = outputEl.scrollHeight;
  }

  // Helper untuk membuat format tabel ASCII sederhana biar vibes terminalnya kuat
  function createAsciiTable(headers, rows) {
    let lengths = headers.map(h => h.length);
    rows.forEach(row => {
      row.forEach((cell, i) => {
        lengths[i] = Math.max(lengths[i], String(cell).length);
      });
    });

    const makeRow = (arr) => '| ' + arr.map((cell, i) => String(cell).padEnd(lengths[i])).join(' | ') + ' |';
    const line = '+' + lengths.map(l => '-'.repeat(l + 2)).join('+') + '+';

    let result = [line, makeRow(headers), line];
    rows.forEach(row => result.push(makeRow(row)));
    result.push(line);
    return result.join('\n');
  }

  async function handleCommand(rawInput) {
    const trimInput = rawInput.trim();
    if (!trimInput) return;

    printLine(`krouter_cli:~$ ${trimInput}`, 'cmd-color');

    // Mengambil argumen perintah
    const args = trimInput.split(' ');
    const command = args[0].toLowerCase();

    // Proteksi token untuk perintah yang butuh jaringan backend
    if (['status', 'chat'].includes(command) && !token) {
      printLine("Error: Unauthorized. Gunakan perintah: set-token [TOKEN_LO]", "error-msg");
      return;
    }

    switch(command) {
      case 'clear':
        outputEl.innerHTML = '';
        break;

      case 'help':
        printLine('===================== K-ROUTER MANUAL CORE =====================');
        printLine('  help                        Tampilkan menu bantuan ini');
        printLine('  clear                       Bersihkan layar terminal');
        printLine('  set-token [BearerToken]     Simpan token gerbang keamanan router');
        printLine('  status                      Tarik status konektivitas 14 model AI');
        printLine('  chat [prompt]               Kirim pesan langsung ke Auto Router');
        printLine('================================================================');
        break;

      case 'set-token':
        const inputToken = args[1];
        if (!inputToken) {
          printLine('Error: Token tidak boleh kosong. Contoh: set-token secret123', 'error-msg');
        } else {
          token = inputToken;
          localStorage.setItem('kr_token', token);
          printLine('Success: Token berhasil diamankan di penyimpanan lokal!', 'sys-greet');
        }
        break;

      case 'status':
        printLine('Connecting to K-Router Infrastructure Core...');
        try {
          const res = await fetch('/api/status', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (res.status === 401) throw new Error("Token salah atau kadaluarsa.");
          if (!res.ok) throw new Error(`HTTP Error ${res.status}`);

          const data = await res.json();
          
          // Susun data ke tabel ASCII
          const headers = ['ID', 'Provider/Model Name', 'Config', 'Status', 'Latency'];
          const rows = data.providers.map(p => [
            p.id,
            p.name,
            p.configured ? 'READY' : 'NOT_SET',
            p.up === true ? 'ONLINE' : p.up === false ? 'DOWN' : 'UNKNOWN',
            p.latencyMs ? `${p.latencyMs}ms` : '—'
          ]);

          printLine('\n' + createAsciiTable(headers, rows));
          printLine(`\nPinged at: ${data.pingedAt}`, 'sys-greet');
        } catch (err) {
          printLine(`System Failure: ${err.message}`, 'error-msg');
        }
        break;

      case 'chat':
        const promptMsg = args.slice(1).join(' ');
        if (!promptMsg) {
          printLine('Error: Prompt chat harus diisi. Contoh: chat bikin function javascript', 'error-msg');
          return;
        }

        printLine('Routing request & waiting for AI response...');
        try {
          // Sistem mengambil format payload history minimalis ala CLI
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
              messages: [{ role: 'user', content: promptMsg }],
              provider: 'auto_router',
              effort: 'medium'
            })
          });

          if (res.status === 401) throw new Error("Unauthorized — Token lo salah.");
          if (!res.ok) throw new Error(`Server Return Status ${res.status}`);

          const data = await res.json();
          const aiReply = data.choices?.[0]?.message?.content || 'No response data.';
          const pickedModel = data._provider || 'Unknown Provider';
          const latency = data._latencyMs || 0;

          printLine(`\n[Response from: ${pickedModel} | Latency: ${latency}ms]`, 'sys-greet');
          printLine('----------------------------------------------------------------');
          printLine(aiReply);
          printLine('----------------------------------------------------------------\n');
        } catch (err) {
          printLine(`Request Failed: ${err.message}`, 'error-msg');
        }
        break;

      default:
        printLine(`Command not found: '${command}'. Ketik 'help' untuk melihat list perintah.`, 'error-msg');
    }
  }

  inputEl.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') {
      const value = inputEl.value;
      inputEl.value = '';
      inputEl.disabled = true;
      await handleCommand(value);
      inputEl.disabled = false;
      inputEl.focus();
    }
  });

  // Memastikan input otomatis fokus pas layar di-klik di browser HP
  document.body.addEventListener('click', () => inputEl.focus());
  
  // Trigger cek token awal
  if(token) {
    printLine("System: Token terdeteksi. Siap mengeksekusi perintah aman.", "sys-greet");
  } else {
    printLine("Warning: Token belum ter-set. Jalankan 'set-token' terlebih dahulu.", "error-msg");
  }
</script>     
</body>
</html>
