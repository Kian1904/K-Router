<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>K-Router >_ Terminal Core</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0a0b10;
      --text-color: #a6accd;
      --prompt-color: #c792ea;
      --cmd-color: #89ddff;
      --success-color: #c3e88d;
      --error-color: #f07178;
      --warn-color: #ffcb6b;
      --info-color: #82aaff;
    }
    * { box-sizing: border-box; }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      margin: 0;
      padding: 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #terminal-output {
      flex: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 12px;
    }
    .line { margin-bottom: 3px; }
    .sys-greet { color: var(--success-color); font-weight: bold; }
    .error-msg { color: var(--error-color); }
    .warn-msg { color: var(--warn-color); }
    .info-msg { color: var(--info-color); }
    .cmd-line { color: var(--cmd-color); }
    
    .prompt-row {
      display: flex;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 8px;
    }
    .prompt-sign {
      color: var(--prompt-color);
      margin-right: 8px;
      user-select: none;
    }
    #terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--cmd-color);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      outline: none;
      padding: 0;
    }
  </style>
</head>
<body>

  <div id="terminal-output">
    <div class="line sys-greet">=== K-ROUTER CLI ENGINE TERMINAL v2.0 ===</div>
    <div class="line info-msg">Clustered Engine Model Grouping Architecture (9router style)</div>
    <div class="line">Ketik 'help' untuk melihat manual baris perintah lengkap.</div>
    <div class="line">------------------------------------------------------------------</div>
  </div>

  <div class="prompt-row">
    <span class="prompt-sign" id="prompt-label">krouter_cli[auto_router]:~$</span>
    <input type="text" id="terminal-input" autofocus autocomplete="off" spellcheck="false">
  </div>

  <script>
    const outputEl = document.getElementById('terminal-output');
    const inputEl = document.getElementById('terminal-input');
    const promptLabel = document.getElementById('prompt-label');

    let token = localStorage.getItem('kr_token') || '';
    let selectedModelId = 'auto_router'; // State model yang aktif terkunci
    let cachedProviders = [];

    function printLine(text, className = '') {
      const div = document.createElement('div');
      div.className = `line ${className}`;
      div.innerText = text;
      outputEl.appendChild(div);
      outputEl.scrollTop = outputEl.scrollHeight;
    }

    // Helper Progress Bar ASCII untuk Analytics
    function makeProgressBar(percentage, size = 15) {
      const dots = Math.round((percentage / 100) * size);
      const empty = size - dots;
      return '[' + '█'.repeat(dots) + '░'.repeat(empty) + ']';
    }

    // Aturan filter cerdas untuk memilah model berdasarkan Pembuat/Arsitektur Aslinya
    function getArchitectureGroup(modelName, id) {
      const name = (modelName || id || '').toLowerCase();
      if (name.includes('gemini') || name.includes('gemma')) return 'google';
      if (name.includes('llama')) return 'meta';
      if (name.includes('phi')) return 'microsoft';
      if (name.includes('glm')) return 'z-ai';
      if (name.includes('mistral')) return 'mistral-ai';
      if (name.includes('claude')) return 'anthropic';
      if (name.includes('north') || name.includes('cohere')) return 'cohere';
      if (name.includes('minimax')) return 'minimax';
      return 'other';
    }

    async function handleCommand(rawInput) {
      const trimInput = rawInput.trim();
      if (!trimInput) return;

      printLine(`${promptLabel.innerText} ${trimInput}`, 'cmd-line');

      const args = trimInput.split(' ');
      const command = args[0].toLowerCase();

      if (['status', 'chat', 'dashboard', 'analytics', 'models'].includes(command) && !token) {
        printLine("Error: Akses ditolak. Jalankan perintah: auth [TOKEN_LO]", "error-msg");
        return;
      }

      switch(command) {
        case 'clear':
          outputEl.innerHTML = '';
          break;

        case 'help':
          printLine('===================== K-ROUTER COMMAND LIST =====================');
          printLine('  help                     Tampilkan panduan ini');
          printLine('  clear                    Bersihkan monitor terminal');
          printLine('  auth [Token]             Input token keamanan gerbang router');
          printLine('  models                   List semua model terkelompok (9router style)');
          printLine('  use [model_id]           Kunci chat ke model tertentu (e.g. use google_gemini)');
          printLine('  chat [prompt]            Kirim pesan ke model terpilih / auto_router');
          printLine('  dashboard                Tarik data log performa global router');
          printLine('  analytics                Tampilkan distribusi token & request');
          printLine('=================================================================');
          break;

        case 'auth':
          if (!args[1]) {
            printLine('Error: Token wajib diisi. Contoh: auth secret_token', 'error-msg');
          } else {
            token = args[1];
            localStorage.setItem('kr_token', token);
            printLine('Success: Token berhasil diverifikasi dan disimpan!', 'sys-greet');
          }
          break;

        case 'models':
          printLine('Fetching and structuralizing models tree layout...');
          try {
            const res = await fetch('/api/status', { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error(`Status ${res.status}`);
            const data = await res.json();
            cachedProviders = data.providers || [];

            // Proses grouping berdasarkan Owner Arsitektur
            const groups = {};
            cachedProviders.forEach(p => {
              const groupName = getArchitectureGroup(p.model, p.id);
              if (!groups[groupName]) groups[groupName] = [];
              groups[groupName].push(p);
            });

            printLine('\n◼ MODEL REGISTRY ARCHITECTURE TREE:');
            Object.keys(groups).sort().forEach(group => {
              printLine(`├── @${group}/`);
              groups[group].forEach(p => {
                const isSelected = p.id === selectedModelId ? ' *ACTIVE*' : '';
                const statusDot = p.up ? '● ONLINE' : p.up === false ? '○ DOWN' : '◌ UNKNOWN';
                printLine(`│   ├── [${p.id}] ${p.model || '—'}${isSelected}`);
                printLine(`│   │   └── Platform Route: ${p.name} | ${statusDot} | ${p.latencyMs ? p.latencyMs+'ms' : '—'}`);
              });
            });
            printLine('');
          } catch(err) {
            printLine(`Failed to cluster models: ${err.message}`, 'error-msg');
          }
          break;

        case 'use':
          const targetId = args[1];
          if (!targetId) {
            printLine('Error: Masukkan ID model. Contoh: use google_gemini', 'error-msg');
            return;
          }
          if (targetId === 'auto_router') {
            selectedModelId = 'auto_router';
            promptLabel.innerText = `krouter_cli[auto_router]:~$`;
            printLine('Success: Jalur dikembalikan ke Auto Router default.', 'sys-greet');
            return;
          }
          selectedModelId = targetId;
          promptLabel.innerText = `krouter_cli[${targetId}]:~$`;
          printLine(`Success: Sesi terkunci. Semua prompt chat sekarang diarahkan ke model [${targetId}].`, 'info-msg');
          break;

        case 'chat':
          const prompt = args.slice(1).join(' ');
          if (!prompt) {
            printLine('Error: Isi prompt chat lo. Contoh: chat hitung 1+1', 'error-msg');
            return;
          }

          printLine(`Executing prompt via router branch [${selectedModelId}]...`);
          try {
            const res = await fetch('/api/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
              body: JSON.stringify({
                messages: [{ role: 'user', content: prompt }],
                provider: selectedModelId,
                effort: 'medium'
              })
            });

            if (!res.ok) throw new Error(`Server failure ${res.status}`);
            const data = await res.json();
            
            const reply = data.choices?.[0]?.message?.content || 'No text content response.';
            const picked = data._provider || 'Unknown';
            const latency = data._latencyMs || 0;

            printLine(`\n[=== RESPONSE FROM: ${picked.toUpperCase()} | LATENCY: ${latency}ms ===]`, 'sys-greet');
            printLine(reply);
            printLine('[========================================================]\n');
          } catch (err) {
            printLine(`Chat pipeline crash: ${err.message}`, 'error-msg');
          }
          break;

        case 'dashboard':
          printLine('Querying performance logs from database core...');
          try {
            const res = await fetch('/api/log?range=24h&limit=5', { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error(`Fetch error ${res.status}`);
            const data = await res.json();

            printLine('\n================ GLOBAL PERFORMANCE CORE (24H) ================');
            printLine(`Total Requests : ${data.stats.total} hits`);
            printLine(`Success Rate   : ${data.stats.successRate}% (${data.stats.succeeded} OK / ${data.stats.failed} FAILED)`);
            printLine(`Avg Latency    : ${data.stats.avgLatency || 0} ms`);
            printLine(`Active Track   : ${data.stats.activeProviders.join(', ') || 'None'}`);
            printLine('================================================================');
          } catch(err) {
            printLine(`Dashboard log fetch failed: ${err.message}`, 'error-msg');
          }
          break;

        case 'analytics':
          printLine('Analyzing token metrics and distributions...');
          try {
            const res = await fetch('/api/log?range=7d&limit=10', { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error(`Fetch error ${res.status}`);
            const data = await res.json();

            printLine('\n================ TOKEN DISTRIBUTION METRICS ================');
            printLine(`Total Input Tokens  : ${data.stats.totalTokensIn.toLocaleString()}`);
            printLine(`Total Output Tokens : ${data.stats.totalTokensOut.toLocaleString()}`);
            printLine('------------------------------------------------------------');
            
            printLine('◼ EFFORT LEVEL ALLOCATION:');
            const totalEfforts = Object.values(data.effortDistribution).reduce((a,b)=>a+b, 0) || 1;
            Object.entries(data.effortDistribution).forEach(([k, v]) => {
              const pct = Math.round((v / totalEfforts) * 100);
              printLine(`  ${k.toUpperCase().padEnd(6)} : ${makeProgressBar(pct)} ${pct}% (${v} hits)`);
            });
            printLine('============================================================');
          } catch(err) {
            printLine(`Analytics compilation failed: ${err.message}`, 'error-msg');
          }
          break;

        default:
          printLine(`Command not found: '${command}'. Ketik 'help' untuk daftar fungsi.`, 'error-msg');
      }
    }

    inputEl.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        const val = inputEl.value;
        inputEl.value = '';
        inputEl.disabled = true;
        await handleCommand(val);
        inputEl.disabled = false;
        inputEl.focus();
      }
    });

    document.body.addEventListener('click', () => inputEl.focus());
    if(token) printLine("System: Secure token active. Engine terminal ready.", "sys-greet");
    else printLine("Warning: Token required. Silakan jalankan perintah 'auth [token_lo]'.", "warn-msg");
  </script>
</body>
</html>
