<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K's Router</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    :root {
      --bg: #07090f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
      --text: #e2e8f0;
      --muted: #475569;
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.12);
      --blue: #38bdf8;
      --blue-dim: rgba(56,189,248,0.08);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      font-size: 0.85rem;
      font-family: monospace;
      color: var(--green);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .signal {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: monospace;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .signal-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .signal-dot.active {
      background: var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .spacer { flex: 1; }
    select#provider-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.75rem;
      padding: 0.3rem 0.5rem;
      outline: none;
      cursor: pointer;
      max-width: 130px;
    }
    button.icon-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0.3rem;
      border-radius: 6px;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    button.icon-btn:hover { color: var(--text); }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .msg-meta {
      font-family: monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .msg-meta .role {
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .msg.user { background: var(--blue-dim); border-left: 2px solid var(--blue); }
    .msg.user .role { color: var(--blue); }
    .msg.ai { border-left: 2px solid var(--green); }
    .msg.ai .role { color: var(--green); }
    .msg.error { background: var(--red-dim); border-left: 2px solid var(--red); }
    .msg.error .role { color: var(--red); }
    .msg.search { border-left: 2px solid #a78bfa; }
    .msg.search .role { color: #a78bfa; }
    .msg.thinking { opacity: 0.6; }

    /* Markdown content */
    .msg-content { color: var(--text); }
    .msg-content p { margin-bottom: 0.5rem; }
    .msg-content p:last-child { margin-bottom: 0; }
    .msg-content code {
      font-family: monospace;
      font-size: 0.85em;
      background: rgba(255,255,255,0.07);
      padding: 0.1em 0.35em;
      border-radius: 4px;
      color: #fbbf24;
    }
    .msg-content pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      overflow-x: auto;
      margin: 0.5rem 0;
    }
    .msg-content pre code {
      background: none;
      padding: 0;
      color: #86efac;
      font-size: 0.82em;
    }
    .msg-content strong { color: #f8fafc; }
    .msg-content ul, .msg-content ol {
      padding-left: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .msg-content li { margin-bottom: 0.2rem; }
    .msg-content a { color: var(--blue); }
    .msg-content h1, .msg-content h2, .msg-content h3 {
      color: #f8fafc;
      margin: 0.75rem 0 0.4rem;
      font-size: 1rem;
    }

    /* Actions */
    .msg-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .action-btn {
      font-family: monospace;
      font-size: 0.68rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      transition: color 0.2s;
    }
    .action-btn:hover { color: var(--text); }

    /* Search results */
    .search-answer {
      margin-bottom: 0.6rem;
      color: var(--text);
    }
    .search-results { display: flex; flex-direction: column; gap: 0.4rem; }
    .search-link {
      font-size: 0.8rem;
      color: var(--blue);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    /* Dots animation */
    .dots span {
      animation: blink 1.2s infinite;
      opacity: 0;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

    /* Empty state */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 0.5rem;
      color: var(--muted);
    }
    #empty .big { font-family: monospace; font-size: 1.5rem; color: var(--green); }
    #empty p { font-size: 0.82rem; text-align: center; line-height: 1.8; }
    #empty code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1em 0.4em;
      font-size: 0.8em;
      color: #fbbf24;
      font-family: monospace;
    }

    /* Footer */
    footer {
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      flex-shrink: 0;
    }
    textarea#input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.65rem 0.85rem;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      height: 42px;
      max-height: 140px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea#input:focus { border-color: rgba(74,222,128,0.35); }
    textarea#input::placeholder { color: var(--muted); }
    button#send {
      background: var(--green);
      color: #07090f;
      border: none;
      border-radius: 8px;
      padding: 0 1rem;
      height: 42px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    button#send:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Setup overlay */
    #setup {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      z-index: 100;
    }
    #setup.hidden { display: none; }
    #setup .logo-big { font-family: monospace; font-size: 1.4rem; color: var(--green); }
    #setup p { color: var(--muted); font-size: 0.85rem; }
    #token-input {
      width: 100%;
      max-width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    #token-input.err { border-color: var(--red); }
    #setup-error { color: var(--red); font-size: 0.8rem; display: none; }
    #save-token {
      background: var(--green);
      color: #07090f;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 2rem;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<div id="setup">
  <div class="logo-big">K's Router</div>
  <p>Masukkan bearer token untuk mulai.</p>
  <input id="token-input" type="password" placeholder="token..." autocomplete="off" />
  <p id="setup-error">Token salah, coba lagi.</p>
  <button id="save-token">Masuk</button>
</div>

<header>
  <span class="logo">K's Router</span>
  <div class="signal">
    <div class="signal-dot" id="signal-dot"></div>
    <span id="provider-label">idle</span>
  </div>
  <div class="spacer"></div>
  <select id="provider-select">
  <option value="groq">
    Groq — Llama 3.3
  </option>

  <option value="flatkey">
    FlatKey — GPT-4o Mini
  </option>

  <option value="nvidia">
    Qwen - Qwen3.5
  </option>

  <option value="nvidia">
    Deepseek - Deepseek v4 Pro
  </option>

  <option value="kilo">
    Kilo Gateway — Claude Haiku 4.5
  </option>

  <option value="openrouter">
    OpenRouter - Gemma 4
  </select>
  <button class="icon-btn" id="clear-btn" title="Clear chat">✕</button>
</header>

<div id="messages">
  <div id="empty">
    <div class="big">/</div>
    <p>
      Ketik pesan untuk mulai.<br>
      Gunakan <code>/search query</code> untuk real-time data.
    </p>
  </div>
</div>

<footer>
  <textarea id="input" placeholder="Pesan... atau /search query" rows="1"></textarea>
  <button id="send">Kirim</button>
</footer>

<script>
  // Config
  const CHAT_ENDPOINT = '/api/chat'
  const SEARCH_ENDPOINT = '/api/search'

  // State
  let TOKEN = localStorage.getItem('kr_token') || ''
  let history = []

  // Markdown config
  marked.setOptions({ breaks: true, gfm: true })

  // Elements
  const setupEl = document.getElementById('setup')
  const tokenInput = document.getElementById('token-input')
  const setupError = document.getElementById('setup-error')
  const messagesEl = document.getElementById('messages')
  const emptyEl = document.getElementById('empty')
  const inputEl = document.getElementById('input')
  const sendBtn = document.getElementById('send')
  const providerSelect = document.getElementById('provider-select')
  const signalDot = document.getElementById('signal-dot')
  const providerLabel = document.getElementById('provider-label')

  // Setup
  if (TOKEN) setupEl.classList.add('hidden')

  document.getElementById('save-token').onclick = async () => {
    const val = tokenInput.value.trim()
    if (!val) return
    try {
      const test = await fetch(CHAT_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + val },
        body: JSON.stringify({ messages: [{ role: 'user', content: 'hi' }] })
      })
      if (test.status === 401) {
        tokenInput.classList.add('err')
        setupError.style.display = 'block'
        return
      }
    } catch (_) {}
    TOKEN = val
    localStorage.setItem('kr_token', val)
    setupEl.classList.add('hidden')
  }

  document.getElementById('clear-btn').onclick = () => {
    history = []
    messagesEl.innerHTML = ''
    messagesEl.appendChild(emptyEl)
    emptyEl.style.display = 'flex'
    setSignal('idle')
  }

  // Signal
  function setSignal(state, label) {
    if (state === 'routing') {
      signalDot.classList.add('active')
      providerLabel.textContent = 'routing...'
    } else if (state === 'provider') {
      signalDot.classList.add('active')
      providerLabel.textContent = label
    } else {
      signalDot.classList.remove('active')
      providerLabel.textContent = 'idle'
    }
  }

  // Add message
  function addMsg(role, content, opts = {}) {
    emptyEl.style.display = 'none'

    const div = document.createElement('div')
    div.className = 'msg ' + role + (opts.thinking ? ' thinking' : '')

    const meta = document.createElement('div')
    meta.className = 'msg-meta'

    const roleSpan = document.createElement('span')
    roleSpan.className = 'role'
    roleSpan.textContent = role === 'user' ? 'YOU' : role === 'error' ? 'ERROR' : role === 'search' ? 'SEARCH' : 'AI'
    meta.appendChild(roleSpan)

    if (opts.provider) {
      const pSpan = document.createElement('span')
      pSpan.textContent = '· ' + opts.provider
      meta.appendChild(pSpan)
    }

    const ts = document.createElement('span')
    ts.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    meta.appendChild(ts)

    div.appendChild(meta)

    const contentDiv = document.createElement('div')
    contentDiv.className = 'msg-content'

    if (opts.thinking) {
      contentDiv.innerHTML = '<span class="dots"><span>.</span><span>.</span><span>.</span></span>'
    } else if (role === 'search') {
      if (content.answer) {
        const ans = document.createElement('div')
        ans.className = 'search-answer'
        ans.textContent = content.answer
        contentDiv.appendChild(ans)
      }
      const links = document.createElement('div')
      links.className = 'search-results'
      content.results.forEach(r => {
        const a = document.createElement('a')
        a.className = 'search-link'
        a.href = r.url
        a.target = '_blank'
        a.textContent = r.title
        links.appendChild(a)
      })
      contentDiv.appendChild(links)
    } else {
      contentDiv.innerHTML = marked.parse(content)
    }

    div.appendChild(contentDiv)

    // Copy button for AI messages
    if (role === 'ai' && !opts.thinking) {
      const actions = document.createElement('div')
      actions.className = 'msg-actions'
      const copyBtn = document.createElement('button')
      copyBtn.className = 'action-btn'
      copyBtn.textContent = 'copy'
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(content)
        copyBtn.textContent = 'copied!'
        setTimeout(() => { copyBtn.textContent = 'copy' }, 1500)
      }
      actions.appendChild(copyBtn)
      div.appendChild(actions)
    }

    messagesEl.appendChild(div)
    messagesEl.scrollTop = messagesEl.scrollHeight
    return div
  }

  // Search
  async function doSearch(query) {
    addMsg('user', '/search ' + query)
    const thinking = addMsg('search', '', { thinking: true })
    setSignal('routing')
    try {
      const res = await fetch(SEARCH_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
        body: JSON.stringify({ query })
      })
      const data = await res.json()
      thinking.remove()
      addMsg('search', data)
      setSignal('idle')

      // Inject ke history + auto-ask AI
      const context = 'Use ONLY the following search results to answer. Do not use prior knowledge.\n\n' +
        'Search results for "' + query + '":\n\n' +
        (data.answer ? 'Summary: ' + data.answer + '\n\n' : '') +
        data.results.map((r, i) => (i+1) + '. ' + r.title + '\n' + r.content).join('\n\n') +
        '\n\nBased on the above, answer: ' + query

      history.push({ role: 'user', content: context })
      sendBtn.disabled = true
      setSignal('routing')
      const aiThinking = addMsg('ai', '', { thinking: true })

      const body = { messages: history }
      const sel = providerSelect.value
      if (sel) body.provider = sel

      const aiRes = await fetch(CHAT_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
        body: JSON.stringify(body)
      })
      const aiData = await aiRes.json()
      const reply = aiData.choices?.[0]?.message?.content || 'No response.'
      aiThinking.remove()
      addMsg('ai', reply, { provider: aiData._provider })
      history.push({ role: 'assistant', content: reply })
      setSignal('provider', aiData._provider)

    } catch (err) {
      thinking.remove()
      addMsg('error', 'Search failed: ' + err.message)
      setSignal('idle')
    } finally {
      sendBtn.disabled = false
    }
  }

  // Send
  async function send() {
    const text = inputEl.value.trim()
    if (!text) return

    inputEl.value = ''
    inputEl.style.height = '42px'

    if (text.startsWith('/search ')) {
      await doSearch(text.slice(8).trim())
      return
    }

    sendBtn.disabled = true
    history.push({ role: 'user', content: text })
    addMsg('user', text)
    const thinking = addMsg('ai', '', { thinking: true })
    setSignal('routing')

    try {
      const body = { messages: history }
      const sel = providerSelect.value
      if (sel) body.provider = sel

      const res = await fetch(CHAT_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
        body: JSON.stringify(body)
      })

      if (res.status === 401) {
        thinking.remove()
        addMsg('error', 'Unauthorized — token salah.')
        localStorage.removeItem('kr_token')
        setupEl.classList.remove('hidden')
        setSignal('idle')
        return
      }
      if (!res.ok) {
        thinking.remove()
        addMsg('error', 'Error ' + res.status + ' — semua provider gagal.')
        setSignal('idle')
        return
      }

      const data = await res.json()
      const reply = data.choices?.[0]?.message?.content || 'No response.'
      thinking.remove()
      addMsg('ai', reply, { provider: data._provider })
      history.push({ role: 'assistant', content: reply })
      setSignal('provider', data._provider)

    } catch (err) {
      thinking.remove()
      addMsg('error', 'Request failed: ' + err.message)
      setSignal('idle')
    } finally {
      sendBtn.disabled = false
    }
  }

  sendBtn.onclick = send
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() }
  })
  inputEl.addEventListener('input', () => {
    inputEl.style.height = '42px'
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px'
  })
</script>
</body>
  </html>
