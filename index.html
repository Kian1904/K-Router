<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K's Router</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060910;
      color: #f1f5f9;
      font-family: 'Sora', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    h1 { font-size: 1.25rem; color: #4ade80; margin-bottom: 0.25rem; }
    .sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 2rem; }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .provider-name { font-size: 0.95rem; }
    .provider-model { font-size: 0.75rem; color: #94a3b8; margin-top: 0.2rem; }
    .badge {
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
    }
    .badge.ok { background: rgba(74,222,128,0.15); color: #4ade80; }
    .badge.off { background: rgba(248,113,113,0.15); color: #f87171; }
    .ts { color: #3f4a5c; font-size: 0.75rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <h1>K's Router</h1>
  <p class="sub">AI provider status</p>
  <div id="list">Loading...</div>
  <p class="ts" id="ts"></p>

  <script>
    fetch('/api/status')
      .then(r => r.json())
      .then(data => {
        document.getElementById('ts').textContent = 'Last checked: ' + new Date(data.timestamp).toLocaleTimeString()
        document.getElementById('list').innerHTML = data.providers.map(p => `
          <div class="card">
            <div>
              <div class="provider-name">${p.name}</div>
              <div class="provider-model">${p.model}</div>
            </div>
            <span class="badge ${p.configured ? 'ok' : 'off'}">
              ${p.configured ? 'Ready' : 'No key'}
            </span>
          </div>
        `).join('')
      })
      .catch(() => {
        document.getElementById('list').textContent = 'Failed to load status.'
      })
  </script>
</body>
</html>
