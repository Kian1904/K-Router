name: Build Android APK
on:
  workflow_dispatch: # Biar bisa lo klik manual lewat tombol di HP

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Android Core Files
        run: |
          mkdir -p android-project/app/src/main/java/com/kian/router
          mkdir -p android-project/app/src/main/res/values

          cat << 'EOF' > android-project/settings.gradle
          include ':app'
          EOF

          cat << 'EOF' > android-project/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat << 'EOF' > android-project/app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.kian.router'
              compileSdk 34
              defaultConfig {
                  applicationId "com.kian.router"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
          }
          EOF

          cat << 'EOF' > android-project/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="@string/app_name"
                  android:usesCleartextTraffic="true"
                  android:allowBackup="true">
                  <activity android:name=".MainActivity" android:exported="true" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat << 'EOF' > android-project/app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">K\'s Router</string>
          </resources>
          EOF

          cat << 'EOF' > android-project/app/src/main/java/com/kian/router/MainActivity.java
          package com.kian.router;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("https://k-router-iota.vercel.app");
                  setContentView(webView);
              }
          }
          EOF

      - name: Setup Gradle Build Environment
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Compile Java into Android APK
        run: |
          cd android-project
          gradle assembleRelease

      - name: Deploy Binary to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: K-Router-Installer
          path: android-project/app/build/outputs/apk/release/app-release.apk
